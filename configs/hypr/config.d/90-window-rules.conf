windowrule = match:class imv, tag +preview
windowrule = match:class org.gnome.Loupe, tag +preview

windowrule {
  name = imv
  match:tag = preview
  float = on
  center = on
  size = (monitor_w*0.6) (monitor_h*0.6)
}



windowrule = tag +floating, match:title Volume Control
windowrule = tag +floating, match:title Network Connections
windowrule = tag +floating, match:class nm-connection-editor
windowrule = tag +floating, match:title File Operation Progress
windowrule = tag +floating, match:title Torrent Options
windowrule = tag +floating, match:title Media viewer
windowrule = tag +floating, match:class blueman-manager
windowrule = tag +floating, match:title Save File, match:class vivaldi-stable
windowrule = tag +floating, match:title Steam Settings, match:class steam
windowrule = tag +floating, match:title ^(Vivaldi Settings.*)$, match:class vivaldi-stable
windowrule = tag +floating, match:class vlc
windowrule = tag +floating, match:class nwg-look
windowrule = tag +floating, match:title ^(Opening.*)$, match:class firefox
windowrule = tag +floating, match:class mpv

windowrule = tag +floating, match:title Confirm to replace files, match:class thunar
windowrule = tag +floating, match:title ^(.* - Properties)$, match:class thunar
windowrule = float on, match:class thunar, match:title ^(Rename).*


