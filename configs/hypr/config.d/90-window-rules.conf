windowrule = match:initial_class float, float on
windowrule = match:initial_class float_term, float on
windowrule = match:fullscreen_state_client 1, border_color rgb(7F848D) rgb(d8dee8)
windowrule = match:xwayland true, border_color rgb(f2f20d)

windowrule {
  name = launcher
  match:class = wofi

  border_size = 0
  stay_focused = on
}

windowrule {
  name = kitty_tail
  match:class = kitty
  opacity = 0.75
}

windowrule {
  name = kitty_oled_fullscreen
  match:fullscreen_state_client = 2
  opacity = override 1
}

windowrule {
  name = 1password
  match:class = 1password

  float = on
  size = 784 400
  move = (monitor_w-802) (monitor_h-444)
}


windowrule = match:title Picture in picture, tag +PiP
windowrule = match:title Picture-in-Picture, tag +PiP

windowrule {
  # Base window is 1920x1080, via 16:9 ratio
  # The base window is scaled down (by product it to 0.15, etc)
  # Then it positioned to the bottom right screen edge, via monitor_w-win_w and monitor_h-win_h
  # And then paddings are deducted from the position

  name = picture_in_picture
  match:tag = PiP

  float = on
  size = (1920*0.15) (1080*0.15)
  move = (monitor_w-(1920*0.15)-30) (monitor_h-(1080*0.15)-30)
  pin = on
  border_size = 0
}

windowrule {
  name = adw_bluetooth
  match:class = com.ezratweaver.AdwBluetooth

  float = on
  size = (monitor_w*0.6) (monitor_h*0.6)
  center = on
}

