---
- hosts: all
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ ansible_env.HOME }}/.cargo/bin"

  tasks:
    - name: Process packages
      include_tasks: manage_package.yml
      when:
        - ('all' in ansible_run_tags and ansible_skip_tags | length == 0) or (package.name in ansible_run_tags) or (package.name not in ansible_skip_tags and (package.name in ansible_run_tags or 'all' in ansible_run_tags))
        - package.skip | default(False) == False
      tags:
        - always
    
      loop: "{{ packages }}"
      loop_control:
        loop_var: package
    
